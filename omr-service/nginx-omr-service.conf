# Nginx configuration for ProfeVision OMR Service
# File: /etc/nginx/sites-available/omr-service.profevision.com
#
# Installation instructions:
# 1. Copy this file: sudo cp nginx-omr-service.conf /etc/nginx/sites-available/omr-service.profevision.com
# 2. Create symlink: sudo ln -s /etc/nginx/sites-available/omr-service.profevision.com /etc/nginx/sites-enabled/
# 3. Test config: sudo nginx -t
# 4. Reload Nginx: sudo systemctl reload nginx
# 5. Get SSL cert: sudo certbot --nginx -d omr-service.profevision.com

# Rate limiting zone (10 requests per second per IP)
limit_req_zone $binary_remote_addr zone=omr_limit:10m rate=10r/s;

# Upstream backend (Docker container on localhost)
upstream omr_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# HTTP server - Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name omr-service.profevision.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name omr-service.profevision.com;

    # SSL certificates (will be managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/omr-service.profevision.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/omr-service.profevision.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/omr-service.profevision.com/chain.pem;

    # SSL configuration (Mozilla Intermediate)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/omr-service.access.log;
    error_log /var/log/nginx/omr-service.error.log;

    # Max upload size (for exam images)
    client_max_body_size 20M;
    client_body_timeout 60s;

    # Proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Health check endpoint (no rate limiting)
    location /health {
        proxy_pass http://omr_backend;
    }

    # API documentation (no rate limiting)
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass http://omr_backend;
    }

    # Main processing endpoint (with rate limiting)
    location /process {
        # Apply rate limiting (burst allows temporary spikes)
        limit_req zone=omr_limit burst=20 nodelay;

        proxy_pass http://omr_backend;
    }

    # Root endpoint
    location / {
        proxy_pass http://omr_backend;
    }
}
