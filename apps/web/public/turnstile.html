<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <style>
      body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: transparent;
      }
    </style>
  </head>
  <body>
    <div id="turnstile-container"></div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const siteKey = params.get('siteKey');
      
      function initTurnstile() {
        if (siteKey && typeof turnstile !== 'undefined') {
          turnstile.render('#turnstile-container', {
            sitekey: siteKey,
            callback: function(token) {
              if (window.ReactNativeWebView) {
                window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'success', token: token }));
              } else {
                console.log('Token:', token);
              }
            },
            'error-callback': function(error) {
              if (window.ReactNativeWebView) {
                window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'error', error: String(error) }));
              } else {
                console.error('Error:', error);
              }
            }
          });
        }
      }
    </script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=initTurnstile" async defer></script>
  </body>
</html>
