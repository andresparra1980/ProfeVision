# ============================================================================
# GLOBAL SETTINGS
# ============================================================================

settings:
  # Translation model preferences
  default_model: "google/gemini-3-flash-preview"
  fallback_model: "anthropic/claude-3-5-sonnet"
  
  # Processing
  batch_size: 5  # Max concurrent translations
  rate_limit_delay: 0.5  # Seconds between requests
  max_retries: 3
  retry_backoff: 2  # Exponential backoff multiplier
  
  # Validation
  validate_structure: true
  validate_placeholders: true
  validate_html_entities: true
  validate_keys: true
  
  # Output
  preserve_formatting: true
  indent_size: 2
  ensure_ascii: false
  
  # Logging
  log_level: "INFO"  # DEBUG | INFO | WARNING | ERROR
  log_file: "translation.log"

# ============================================================================
# COST TRACKING (Estimated)
# ============================================================================

cost_estimates:
  per_1k_tokens: 0.0001  # USD per 1k tokens (Gemini Flash)
  ui_files_tokens: 150000  # Estimated tokens for UI/API
  docs_files_tokens: 200000  # Estimated tokens for Docs
  total_per_language: 35  # USD (rounded)
