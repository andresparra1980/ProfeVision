# Additional guidelines for French translations
additional_guidelines: |
  - Use French standard (France, not Canadian or African variants)
  - Maintain formal tone throughout (vous, not tu)
  - Preserve gender-neutral language when possible
  - Academic terminology should be formal and professional
  - Use proper French typography:
    - Space before : ; ! ?
    - « guillemets français » for quotes
    - Capitalize only first word in titles (unless proper noun)
  - Technical terms from English can stay if commonly used (ex: "dashboard", "email")
  - Date format: DD/MM/YYYY
  - Number format: 1 234,56 (space for thousands, comma for decimals)

# Common phrases and idioms
common_phrases:
  welcome: "Bienvenue"
  get_started: "Commencer"
  learn_more: "En savoir plus"
  contact_us: "Nous contacter"
  terms_of_service: "Conditions d'utilisation"
  privacy_policy: "Politique de confidentialité"
  all_rights_reserved: "Tous droits réservés"

# Examples of quality translations
examples:
  - source: "Crear Examen"
    target: "Créer un Examen"
    notes: "Use article 'un'"
    
  - source: "¿Olvidaste tu contraseña?"
    target: "Mot de passe oublié ?"
    notes: "Space before question mark"
    
  - source: "Gestiona y crea exámenes para tus estudiantes"
    target: "Gérez et créez des examens pour vos étudiants"
    notes: "Formal vous form"
    
  - source: "Has cerrado sesión correctamente"
    target: "Vous avez fermé votre session correctement"
    notes: "Full sentence with vous"
    
  - source: "¡Email Verificado!"
    target: "Email vérifié !"
    notes: "Space before exclamation"

# Quality checks specific to French
quality_checks:
  - check: "formality"
    description: "Ensure 'vous' is used, not 'tu'"
    
  - check: "typography"
    description: "Verify spacing before punctuation (: ; ! ?)"
    
  - check: "articles"
    description: "Check proper use of articles (le/la/les/un/une/des)"
    
  - check: "gender"
    description: "Verify gender agreement (adjectives, past participles)"

# Common mistakes to avoid
common_mistakes:
  - mistake: "Using 'tu' instead of 'vous'"
    correct: "Always use formal 'vous' for users"
    
  - mistake: "No space before : ; ! ?"
    correct: "Always add space before these punctuation marks"
    
  - mistake: "English quotes \" \""
    correct: "Use French guillemets « »"
    
  - mistake: "Translating brand names"
    correct: "Keep 'ProfeVision' unchanged"
