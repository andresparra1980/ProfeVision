# Nginx configuration for ProfeVision LaTeX Service (WITH SSL)
# File: /etc/nginx/sites-available/latex-service.profevision.com
#
# This file shows the FINAL configuration after Certbot adds SSL.
# DO NOT use this file directly - use nginx-latex-service-precertbot.conf instead
# and let Certbot modify it automatically.
#
# This file is kept for reference only.

# Rate limiting zone (5 requests per second per IP - LaTeX is expensive)
limit_req_zone $binary_remote_addr zone=latex_limit:10m rate=5r/s;

# Upstream backend (Docker container on localhost)
upstream latex_backend {
    server 127.0.0.1:8001;
    keepalive 32;
}

# HTTP server - Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name latex-service.profevision.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name latex-service.profevision.com;

    # SSL certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/latex-service.profevision.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/latex-service.profevision.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/latex-service.profevision.com/chain.pem;

    # SSL configuration (Mozilla Intermediate)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/latex-service.access.log;
    error_log /var/log/nginx/latex-service.error.log;

    # Max upload size (for LaTeX source - 2MB should be more than enough)
    client_max_body_size 2M;
    client_body_timeout 120s;

    # Proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # Timeouts (LaTeX compilation can be slow)
    proxy_connect_timeout 120s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    # Health check endpoint (no rate limiting)
    location /health {
        proxy_pass http://latex_backend;
    }

    # API documentation (no rate limiting)
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass http://latex_backend;
    }

    # Main compilation endpoint (with strict rate limiting)
    location /compile {
        # Apply rate limiting (burst allows temporary spikes)
        limit_req zone=latex_limit burst=5 nodelay;

        proxy_pass http://latex_backend;
    }

    # Root endpoint
    location / {
        proxy_pass http://latex_backend;
    }
}
