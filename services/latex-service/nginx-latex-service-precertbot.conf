# Nginx configuration for ProfeVision LaTeX Service (PRE-CERTBOT)
# File: /etc/nginx/sites-available/latex-service.profevision.com
#
# This is the initial configuration BEFORE running certbot.
# Certbot will automatically add SSL configuration when you run:
# sudo certbot --nginx -d latex-service.profevision.com
#
# Installation instructions:
# 1. Copy this file: sudo cp nginx-latex-service-precertbot.conf /etc/nginx/sites-available/latex-service.profevision.com
# 2. Create symlink: sudo ln -s /etc/nginx/sites-available/latex-service.profevision.com /etc/nginx/sites-enabled/
# 3. Test config: sudo nginx -t
# 4. Reload Nginx: sudo systemctl reload nginx
# 5. Get SSL cert: sudo certbot --nginx -d latex-service.profevision.com
# 6. Certbot will automatically modify this file to add SSL config

# Rate limiting zone (5 requests per second per IP - LaTeX is expensive)
limit_req_zone $binary_remote_addr zone=latex_limit:10m rate=5r/s;

# Upstream backend (Docker container on localhost)
upstream latex_backend {
    server 127.0.0.1:8001;
    keepalive 32;
}

# HTTP server - Will be modified by Certbot
server {
    listen 80;
    listen [::]:80;
    server_name latex-service.profevision.com;

    # Logging
    access_log /var/log/nginx/latex-service.access.log;
    error_log /var/log/nginx/latex-service.error.log;

    # Max upload size (for LaTeX source - 2MB should be more than enough)
    client_max_body_size 2M;
    client_body_timeout 120s;

    # Proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # Timeouts (LaTeX compilation can be slow)
    proxy_connect_timeout 120s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    # Health check endpoint (no rate limiting)
    location /health {
        proxy_pass http://latex_backend;
    }

    # API documentation (no rate limiting)
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass http://latex_backend;
    }

    # Main compilation endpoint (with strict rate limiting)
    location /compile {
        # Apply rate limiting (burst allows temporary spikes)
        limit_req zone=latex_limit burst=5 nodelay;

        proxy_pass http://latex_backend;
    }

    # Root endpoint
    location / {
        proxy_pass http://latex_backend;
    }
}
