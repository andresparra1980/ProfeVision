# Nginx configuration for ProfeVision OMR Service (PRE-CERTBOT)
# File: /etc/nginx/sites-available/omr-service.profevision.com
#
# This is the initial configuration BEFORE running certbot.
# Certbot will automatically add SSL configuration when you run:
# sudo certbot --nginx -d omr-service.profevision.com
#
# Installation instructions:
# 1. Copy this file: sudo cp nginx-omr-service-precertbot.conf /etc/nginx/sites-available/omr-service.profevision.com
# 2. Create symlink: sudo ln -s /etc/nginx/sites-available/omr-service.profevision.com /etc/nginx/sites-enabled/
# 3. Test config: sudo nginx -t
# 4. Reload Nginx: sudo systemctl reload nginx
# 5. Get SSL cert: sudo certbot --nginx -d omr-service.profevision.com
# 6. Certbot will automatically modify this file to add SSL config

# Rate limiting zone (10 requests per second per IP)
limit_req_zone $binary_remote_addr zone=omr_limit:10m rate=10r/s;

# Upstream backend (Docker container on localhost)
upstream omr_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# HTTP server - Will be modified by Certbot
server {
    listen 80;
    listen [::]:80;
    server_name omr-service.profevision.com;

    # Logging
    access_log /var/log/nginx/omr-service.access.log;
    error_log /var/log/nginx/omr-service.error.log;

    # Max upload size (for exam images)
    client_max_body_size 20M;
    client_body_timeout 60s;

    # Proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Health check endpoint (no rate limiting)
    location /health {
        proxy_pass http://omr_backend;
    }

    # API documentation (no rate limiting)
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass http://omr_backend;
    }

    # Main processing endpoint (with rate limiting)
    location /process {
        # Apply rate limiting (burst allows temporary spikes)
        limit_req zone=omr_limit burst=20 nodelay;

        proxy_pass http://omr_backend;
    }

    # Root endpoint
    location / {
        proxy_pass http://omr_backend;
    }
}
