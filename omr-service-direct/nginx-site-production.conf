# OMR Direct API - Production Nginx Configuration
# Based on your current setup with corrections
# Location: /etc/nginx/sites-available/omr-direct

# Rate limiting zone (10 requests per second per IP)
limit_req_zone $binary_remote_addr zone=omr_direct_limit:10m rate=10r/s;

# Upstream backend (Docker container on localhost)
upstream omr_backend_direct {
    server 127.0.0.1:8082;  # ⚠️ FIXED: Was 8002, should be 8082
    keepalive 32;
}

# HTTP server - Will be modified by Certbot
server {
    listen 80;
    listen [::]:80;
    server_name omr-direct.profevision.com;

    # Logging (separate from legacy OMR service)
    access_log /var/log/nginx/omr-direct.access.log;  # ⚠️ FIXED: Was omr-service
    error_log /var/log/nginx/omr-direct.error.log;    # ⚠️ FIXED: Was omr-service

    # Max upload size (for exam images)
    client_max_body_size 20M;
    client_body_timeout 60s;

    # Proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Health check endpoint (no rate limiting, no logging)
    location /health {
        access_log off;  # Don't log health checks
        proxy_pass http://omr_backend_direct;
    }

    # API documentation (no rate limiting)
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass http://omr_backend_direct;
    }

    # Main processing endpoint (with rate limiting)
    location /process {
        # Apply rate limiting (burst allows temporary spikes)
        limit_req zone=omr_direct_limit burst=20 nodelay;  # ⚠️ FIXED: Was omr_limit

        proxy_pass http://omr_backend_direct;
    }

    # Root endpoint
    location / {
        proxy_pass http://omr_backend_direct;
    }
}
