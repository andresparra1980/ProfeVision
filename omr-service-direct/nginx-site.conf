# OMR Direct API - Nginx Configuration
# Location: /etc/nginx/sites-available/omr-direct
# Symlink: ln -s /etc/nginx/sites-available/omr-direct /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name omr-direct.profevision.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name omr-direct.profevision.com;

    # SSL certificates (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/omr-direct.profevision.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/omr-direct.profevision.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # CORS headers (handled by FastAPI, but can add here as backup)
    # add_header Access-Control-Allow-Origin "https://profevision.com" always;
    # add_header Access-Control-Allow-Methods "POST, GET, OPTIONS" always;
    # add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

    # Max body size for image uploads
    client_max_body_size 10M;
    client_body_buffer_size 10M;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Proxy settings
    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Disable buffering for faster response
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Health check endpoint (can be used by monitoring)
    location /health {
        proxy_pass http://127.0.0.1:8082/health;
        access_log off;
    }

    # Logging
    access_log /var/log/nginx/omr-direct-access.log;
    error_log /var/log/nginx/omr-direct-error.log warn;
}
